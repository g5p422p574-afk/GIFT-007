{% extends "base.html" %}
{% block title %}{{ '编辑商品' if product else '添加商品' }}{% endblock %}
{% block content %}
<h2 class="page-title">{{ '编辑商品' if product else '添加商品' }}</h2>

{% if error %}
<p style="color:var(--danger);margin-bottom:16px;">{{ error }}</p>
{% endif %}

<form method="POST" enctype="multipart/form-data">
  <div class="form-group">
    <label>商品图片</label>
    {% if product and product.image %}
    <div style="margin-bottom:8px;"><img src="{{ url_for('uploaded_file', filename=product.image) }}" class="thumb" style="width:100px;height:100px;" alt="{{ product.name }}"></div>
    {% endif %}
    <input type="file" name="image" accept="image/*" style="padding:8px;">
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>商品名称 *</label>
      <input type="text" name="name" required maxlength="100" value="{{ product.name if product else '' }}">
    </div>
    <div class="form-group">
      <label>货架号 *</label>
      <input type="text" name="shelf_no" required maxlength="50" value="{{ product.shelf_no if product else '' }}">
    </div>
  </div>
  <div class="form-group">
    <label>价格 *</label>
    <input type="number" name="price" required step="0.01" min="0" value="{{ product.price if product else '' }}">
  </div>
  <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:16px;">{{ '保存修改' if product else '添加商品' }}</button>
</form>
{% endblock %}
