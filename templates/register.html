{% extends "base.html" %}
{% block title %}注册{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h2 class="auth-title">  注册</h2>
    {% if error %}
    <p class="auth-error">{{ error }}</p>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label>店名 *</label>
        <input type="text" name="store_name" required maxlength="50" placeholder="请输入店名">
      </div>
      <div class="form-group">
        <label>手机号 *</label>
        <input type="text" name="phone" required maxlength="20" placeholder="请输入手机号">
      </div>
      <div class="form-group">
        <label>密码 *</label>
        <input type="password" name="password" required placeholder="请输入密码">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:16px;">注册</button>
    </form>
    <p class="auth-link">已有账号？<a href="{{ url_for('home.login') }}">去登录</a></p>
  </div>
</div>
{% endblock %}
