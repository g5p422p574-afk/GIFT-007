{% extends "base.html" %}
{% block title %}登录{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h2 class="auth-title">  登录</h2>
    {% if error %}
    <p class="auth-error">{{ error }}</p>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label>手机号</label>
        <input type="text" name="phone" required maxlength="20" placeholder="请输入手机号">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" name="password" required placeholder="请输入密码">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:16px;">登录</button>
    </form>
    <p class="auth-link">还没有账号？<a href="{{ url_for('home.register') }}">立即注册</a></p>
  </div>
</div>
{% endblock %}
